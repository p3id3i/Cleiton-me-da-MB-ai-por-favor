<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Dados</title>
    <style>
        /* Estilização Geral */
        :root { 
              --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --error-color: #e74c3c;
            --success-color: #2ecc71;
           
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
        }

        /* Formulário */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Área de Resultado */
        #status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            display: none;
            font-size: 0.9rem;
        }

        .error { background-color: #fdeaea; color: var(--error-color); border: 1px solid #fad2d2; }
        .success { background-color: #eafaf1; color: var(--success-color); border: 1px solid #d5f5e3; }

        .dados-box {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .dados-item {
            margin-bottom: 0.5rem;
        }

        .dados-item strong {
            color: #555;
        }
        .link-formulario {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: var(--primary-color);
    font-size: 14px;
    transition: 0.3s;
}

.link-formulario:hover {
    color: var(--primary-hover);
    text-decoration: underline;
}

    </style>
</head>
<body>

<div class="container">
    <h2>Buscar Cadastro</h2>
    
    <form id="consultaForm" action="consulta.php" method="post">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="exemplo@dominio.com">
        </div>
         <button id="btnConsultar">Consultar Dados</button>
         <a href="formulario.html" class="link-formulario">Cadastrar no Formulário</a>
    </form>
    <div id="tabelaResultado">
        <table class="table table-bordered table-hover table-sm mt-2">
            <thead>
                <tr>
                    <th>  ID   </th>
                    <th> CRIADO EM </th>
                    <th>  NOME </th>
                    <th> E-MAIL </th>
                    <th> Endereço </th>

                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="col-id"></td>
                     <td id="col-criado_em"> </td>
                     <td id="col-nome">   </td>
                     <td id="col-email"> </td>
                    <td id="col-endereco"> </td>



                </tr>

            </tbody>

        </table>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function popularTabela(json) {
    // Validação básica
    if (!json.sucesso || !json.cadastro) return;

    const { id, criado_em, nome, email, endereco } = json.cadastro;

    // Preenche os campos
    const c = json.cadastro;
    document.getElementById('col-id').textContent = c.id;
    document.getElementById('col-criado_em').textContent = c.criado_em;
    document.getElementById('col-nome').textContent = c.nome;
    document.getElementById('col-email').textContent = c.email;
    document.getElementById('col-endereco').textContent = c.endereco;

    // Exibe a tabela
    document.getElementById('tabelaResultado').style.display = 'block';
}

document.getElementById('consultaForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const btn = document.getElementById('btnConsultar');

    btn.textContent = "Consultando...";
    document.getElementById('tabelaResultado').style.display = "nome";
    try{
      btn.disabled = true;
      const formData= new FormData();
      formData.append('email', email);

        const response = await fetch('http://localhost/formulario/consulta.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: formData. JSON.stringify({ email })

        });

        if(!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

        const json = await response.json();
        popularTabela(json);

    } catch (error) {
        console.error('Erro na consulta:', error);
        alert('Erro ao consultar dados.' * error.message);
    } finally {
        btn.disabled = false; 
        btn.textContent = "Consultar dados";
    }
});
</script>





   
</div>

</body>
</html>
